[project]
name = "textplex-processor"
version = "0.1.0"
description = "Book processing pipeline for the TextPlex"
requires-python = ">=3.11"
dependencies = ["pydantic>=2", "pillow", "jieba>=0.42.1"]

[project.optional-dependencies]
dev = ["pytest", "ruff", "mypy"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/processor"]
