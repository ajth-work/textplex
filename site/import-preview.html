<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TextPlex Import Preview</title>
    <meta
      name="description"
      content="A standalone add-content import mockup for TextPlex, packaged for GitHub Pages."
    />
    <style>
      :root {
        --bg: #f7f4ee;
        --surface: rgba(255, 255, 255, 0.9);
        --surface-strong: #ffffff;
        --text: #202633;
        --muted: #767d8c;
        --line: rgba(31, 36, 48, 0.08);
        --shadow: 0 18px 40px rgba(20, 24, 35, 0.08);
        --shadow-soft: 0 10px 24px rgba(20, 24, 35, 0.06);
        --accent: #1f335f;
        --blue: #6e8fe6;
        --green: #68aa7d;
        --violet: #8e82db;
        --orange: #d59c4c;
        --red: #e77865;
      }

      * { box-sizing: border-box; }
      html, body { min-height: 100%; }
      body {
        margin: 0;
        color: var(--text);
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top, rgba(255,255,255,0.96), transparent 42%),
          linear-gradient(180deg, #fbf9f5 0%, #f3efe7 100%);
      }

      .app {
        max-width: 430px;
        min-height: 100vh;
        margin: 0 auto;
        padding: 18px 16px 24px;
      }

      .status-row, .topbar, .option-row, .recent-row, .button-row {
        display: flex;
        align-items: center;
      }

      .status-row {
        justify-content: space-between;
        margin-bottom: 12px;
        color: #121826;
        font-size: 15px;
        font-weight: 600;
      }

      .status-icons {
        display: flex;
        gap: 8px;
      }

      .topbar {
        justify-content: center;
        position: relative;
        margin-bottom: 18px;
      }

      .back-btn {
        position: absolute;
        left: 0;
        width: 42px;
        height: 42px;
        border: 0;
        border-radius: 50%;
        background: transparent;
        color: #2a3140;
        display: grid;
        place-items: center;
        cursor: pointer;
      }

      .title {
        margin: 0;
        font-size: 22px;
        line-height: 1;
        font-weight: 900;
        letter-spacing: -0.04em;
      }

      .card {
        background: var(--surface);
        border: 1px solid rgba(31, 36, 48, 0.06);
        border-radius: 22px;
        box-shadow: var(--shadow);
      }

      .option-row {
        gap: 14px;
        padding: 14px;
        margin-bottom: 12px;
        min-height: 78px;
      }

      .option-icon {
        width: 44px;
        height: 44px;
        border-radius: 14px;
        display: grid;
        place-items: center;
        flex: 0 0 auto;
        font-size: 20px;
        font-weight: 900;
        color: #63708a;
      }

      .option-icon.blue { background: rgba(110, 143, 230, 0.12); color: #5b73b5; }
      .option-icon.green { background: rgba(104, 170, 125, 0.12); color: #4e8d64; }
      .option-icon.violet { background: rgba(142, 130, 219, 0.12); color: #7060b9; }
      .option-icon.orange { background: rgba(213, 156, 76, 0.14); color: #c18422; }

      .option-text {
        min-width: 0;
      }

      .option-text h3 {
        margin: 0 0 3px;
        font-size: 15px;
        font-weight: 900;
        letter-spacing: -0.03em;
      }

      .option-text p {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
      }

      .section-heading {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin: 22px 0 12px;
      }

      .section-heading h3 {
        margin: 0;
        font-size: 18px;
        line-height: 1.1;
        font-weight: 900;
        letter-spacing: -0.03em;
      }

      .section-link {
        border: 0;
        background: transparent;
        color: #9aa0ad;
        font-weight: 700;
        font-size: 14px;
        cursor: pointer;
      }

      .recent-list {
        display: grid;
        gap: 12px;
      }

      .recent-row {
        gap: 12px;
        justify-content: space-between;
        padding: 14px;
        min-height: 82px;
      }

      .recent-icon {
        width: 40px;
        height: 40px;
        border-radius: 12px;
        display: grid;
        place-items: center;
        flex: 0 0 auto;
        font-size: 18px;
        font-weight: 900;
      }

      .recent-icon.red { background: rgba(231, 120, 101, 0.12); color: #d65e4b; }
      .recent-icon.green { background: rgba(104, 170, 125, 0.12); color: #4e8d64; }

      .recent-main {
        min-width: 0;
        flex: 1 1 auto;
      }

      .recent-main h4 {
        margin: 0 0 4px;
        font-size: 16px;
        font-weight: 900;
        letter-spacing: -0.03em;
      }

      .recent-main p {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
      }

      .recent-meta {
        flex: 0 0 auto;
        color: #9aa0ad;
        font-size: 13px;
        font-weight: 800;
      }

      .button-row {
        gap: 10px;
      }

      .ocr-btn {
        width: 100%;
        margin-top: 22px;
        border: 0;
        border-radius: 16px;
        padding: 16px 18px;
        color: white;
        background: linear-gradient(180deg, #173a74, #12325f);
        box-shadow: 0 16px 30px rgba(18, 50, 95, 0.28);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        font-size: 16px;
        font-weight: 900;
      }

      @media (max-width: 390px) {
        .app { padding-inline: 12px; }
        .option-row, .recent-row { padding: 12px; }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <button class="back-btn" type="button" aria-label="Back">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 18l-6-6 6-6" />
          </svg>
        </button>
        <h1 class="title">Add Content</h1>
      </header>

      <section class="card option-row">
        <div class="option-icon blue">📄</div>
        <div class="option-text">
          <h3>Paste Text</h3>
          <p>Paste or type any text</p>
        </div>
      </section>

      <section class="card option-row">
        <div class="option-icon green">☁</div>
        <div class="option-text">
          <h3>Upload File</h3>
          <p>PDF, TXT, DOCX, EPUB</p>
        </div>
      </section>

      <section class="card option-row">
        <div class="option-icon violet">🔗</div>
        <div class="option-text">
          <h3>Add from URL</h3>
          <p>Web pages and articles</p>
        </div>
      </section>

      <section class="card option-row">
        <div class="option-icon orange">◎</div>
        <div class="option-text">
          <h3>Manual Vocabulary Item</h3>
          <p>Add a word or phrase</p>
        </div>
      </section>

      <div class="section-heading">
        <h3>Recent Imports</h3>
        <button class="section-link" type="button">See All</button>
      </div>

      <div class="recent-list">
        <article class="card recent-row">
          <div class="recent-icon red">PDF</div>
          <div class="recent-main">
            <h4>唐诗三首首选集.pdf</h4>
            <p>PDF · 2.4 MB</p>
          </div>
          <div class="recent-meta">Today</div>
        </article>

        <article class="card recent-row">
          <div class="recent-icon green">TXT</div>
          <div class="recent-main">
            <h4>Travel Notes – Chengdu.txt</h4>
            <p>TXT · 18 KB</p>
          </div>
          <div class="recent-meta">Yesterday</div>
        </article>
      </div>

      <button class="ocr-btn" type="button">
        <span aria-hidden="true">📷</span>
        <span>Scan Text (OCR)</span>
      </button>
    </main>
  </body>
</html>
