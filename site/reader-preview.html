<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TextPlex Reader Preview</title>
    <meta
      name="description"
      content="A standalone mobile reading view for TextPlex, packaged for GitHub Pages."
    />
    <link rel="stylesheet" href="./preview-wide.css" />
    <style>
      :root {
        --bg-start: #f6f2eb;
        --bg-end: #ede4d7;
        --glow-a: rgba(255, 255, 255, 0.55);
        --glow-b: rgba(31, 51, 95, 0.05);
        --surface: rgba(255, 255, 255, 0.9);
        --surface-strong: #ffffff;
        --surface-muted: #f5f1ea;
        --text: #202633;
        --text-strong: #121826;
        --text-soft: #465064;
        --muted: #787f8d;
        --accent: #1f335f;
        --accent-strong: #182847;
        --accent-soft: rgba(31, 51, 95, 0.12);
        --green: #3f9b68;
        --line: rgba(31, 36, 48, 0.08);
        --line-strong: rgba(31, 36, 48, 0.12);
        --shadow: 0 18px 40px rgba(20, 24, 35, 0.08);
        --shadow-soft: 0 10px 24px rgba(20, 24, 35, 0.06);
        --pill-bg: rgba(31, 36, 48, 0.08);
        --pill-text: #1f2430;
      }

      body[data-reader-theme="sepia"] {
        --bg-start: #f4e2c7;
        --bg-end: #e1c9a8;
        --glow-a: rgba(255, 255, 255, 0.42);
        --glow-b: rgba(139, 91, 48, 0.08);
        --surface: rgba(255, 248, 239, 0.92);
        --surface-strong: #fffaf2;
        --surface-muted: #f2e4d4;
        --text: #2a2018;
        --text-strong: #1f1710;
        --text-soft: #4f3c2e;
        --muted: #7a6656;
        --accent: #8c541f;
        --accent-strong: #6f4016;
        --accent-soft: rgba(140, 84, 31, 0.14);
        --green: #6f7f36;
        --line: rgba(77, 53, 31, 0.1);
        --line-strong: rgba(77, 53, 31, 0.16);
        --shadow: 0 18px 40px rgba(88, 58, 29, 0.1);
        --shadow-soft: 0 10px 24px rgba(88, 58, 29, 0.07);
        --pill-bg: rgba(77, 53, 31, 0.08);
        --pill-text: #4d351f;
      }

      body[data-reader-theme="ink"] {
        --bg-start: #10151d;
        --bg-end: #07090d;
        --glow-a: rgba(122, 162, 255, 0.08);
        --glow-b: rgba(255, 255, 255, 0.04);
        --surface: rgba(20, 24, 31, 0.96);
        --surface-strong: #151920;
        --surface-muted: #1d222c;
        --text: #eef2f8;
        --text-strong: #f7f9fc;
        --text-soft: #cad1de;
        --muted: #a6afbf;
        --accent: #86a8ff;
        --accent-strong: #5d7fe0;
        --accent-soft: rgba(134, 168, 255, 0.16);
        --green: #7ecfa0;
        --line: rgba(255, 255, 255, 0.08);
        --line-strong: rgba(255, 255, 255, 0.12);
        --shadow: 0 22px 48px rgba(0, 0, 0, 0.5);
        --shadow-soft: 0 12px 28px rgba(0, 0, 0, 0.35);
        --pill-bg: rgba(255, 255, 255, 0.08);
        --pill-text: #eef2f8;
      }

      body[data-reader-theme="black"] {
        --bg-start: #020203;
        --bg-end: #000000;
        --glow-a: rgba(136, 166, 255, 0.08);
        --glow-b: rgba(255, 255, 255, 0.02);
        --surface: rgba(10, 11, 14, 0.98);
        --surface-strong: #0b0c0f;
        --surface-muted: #111318;
        --text: #f7f8fb;
        --text-strong: #ffffff;
        --text-soft: #d9dee8;
        --muted: #aeb6c5;
        --accent: #d9bf7a;
        --accent-strong: #f1d28b;
        --accent-soft: rgba(217, 191, 122, 0.14);
        --green: #8dd6a6;
        --line: rgba(255, 255, 255, 0.08);
        --line-strong: rgba(255, 255, 255, 0.12);
        --shadow: 0 22px 48px rgba(0, 0, 0, 0.65);
        --shadow-soft: 0 12px 28px rgba(0, 0, 0, 0.42);
        --pill-bg: rgba(255, 255, 255, 0.06);
        --pill-text: #f7f8fb;
      }

      * { box-sizing: border-box; }
      html, body { min-height: 100%; }
      body {
        margin: 0;
        color: var(--text);
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top, var(--glow-a), transparent 42%),
          radial-gradient(circle at top right, var(--glow-b), transparent 34%),
          linear-gradient(180deg, var(--bg-start) 0%, var(--bg-end) 100%);
      }

      .app {
        max-width: 430px;
        min-height: 100vh;
        margin: 0 auto;
        padding: 18px 16px 22px;
        color: var(--text);
        --reader-display-font: Georgia, "Times New Roman", serif;
        --reader-body-font: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --reader-text-scale: 1;
      }

      .app[data-reader-font="serif"] {
        --reader-display-font: Georgia, "Times New Roman", serif;
        --reader-body-font: Georgia, "Times New Roman", serif;
      }

      .app[data-reader-font="sans"] {
        --reader-display-font: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --reader-body-font: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .app[data-reader-text-size="small"] {
        --reader-text-scale: 0.92;
      }

      .app[data-reader-text-size="medium"] {
        --reader-text-scale: 1;
      }

      .app[data-reader-text-size="large"] {
        --reader-text-scale: 1.1;
      }

      .font-toggle {
        min-width: 70px;
      }

      .reader-body-font {
        font-family: var(--reader-body-font);
      }

      .status-row, .topbar, .tool-row, .info-line, .pill-row, .bottom-actions {
        display: flex;
        align-items: center;
      }

      .status-row {
        justify-content: space-between;
        margin-bottom: 12px;
        color: var(--text-strong);
        font-size: 15px;
        font-weight: 600;
      }

      .status-icons {
        display: flex;
        gap: 8px;
      }

      .topbar {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 18px;
      }

      .icon-btn {
        width: 42px;
        height: 42px;
        border: 0;
        border-radius: 50%;
        background: transparent;
        color: var(--text-strong);
        display: grid;
        place-items: center;
        cursor: pointer;
      }

      .icon-btn.is-active {
        color: var(--green);
      }

      .tool-row {
        gap: 10px;
      }

      .reader-token-mode-toggle {
        min-width: 66px;
        padding-inline: 12px;
        border-radius: 999px;
        background: var(--surface);
        border: 1px solid var(--line);
        color: var(--text-strong);
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.04em;
      }

      .reader-token-mode-toggle.is-active {
        background: var(--accent-soft);
        border-color: rgba(63, 155, 104, 0.28);
        color: var(--green);
      }

      .reader-pager {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        margin: 0 0 12px;
      }

      .session-pill {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 6px 10px;
        margin: 0 0 12px;
        padding: 10px 14px;
        border-radius: 999px;
        background: var(--pill-bg);
        color: var(--pill-text);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.01em;
      }

      .session-pill strong {
        font-size: 13px;
        font-weight: 900;
      }

      .session-pill span {
        color: var(--muted);
        font-weight: 700;
      }

      .page-pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 8px 14px;
        border-radius: 999px;
        background: var(--pill-bg);
        color: var(--pill-text);
        font-size: 13px;
        font-weight: 900;
        letter-spacing: 0.08em;
      }

      .pager-controls {
        display: flex;
        gap: 8px;
      }

      .pager-btn {
        width: 42px;
        height: 42px;
        border: 0;
        border-radius: 50%;
        display: grid;
        place-items: center;
        background: var(--surface);
        color: var(--text-strong);
        box-shadow: var(--shadow-soft);
      }

      .pager-btn:disabled {
        opacity: 0.4;
        box-shadow: none;
      }

      .header-stack {
        flex: 1 1 auto;
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .title-wrap {
        text-align: left;
      }

      .poem-title {
        margin: 0;
        font-family: var(--reader-display-font);
        font-size: calc(clamp(24px, 6vw, 30px) * var(--reader-text-scale));
        line-height: 1.08;
        letter-spacing: -0.05em;
        width: 100%;
        max-width: none;
        margin-inline: 0;
        overflow-wrap: anywhere;
      }

      .poet {
        margin: 8px 0 0;
        color: var(--muted);
        font-family: var(--reader-body-font);
        font-size: calc(16px * var(--reader-text-scale));
        font-weight: 700;
      }

      .settings-row {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px;
      }

      .reading-surface {
        background: var(--surface);
        border: 1px solid rgba(31, 36, 48, 0.05);
        box-shadow: var(--shadow);
        border-radius: 30px;
        overflow: hidden;
      }

      .reading-body {
        padding: 14px 14px 18px;
      }

      .annotated-line {
        margin: 22px 0 30px;
      }

      .sentence-row {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-start;
        align-items: flex-end;
        gap: 8px 12px;
        font-family: var(--reader-body-font);
        font-size: calc(26px * var(--reader-text-scale));
        line-height: 1.5;
        letter-spacing: 0.02em;
      }

      .token {
        display: inline-flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-end;
        min-width: 0;
        padding: 4px 6px 5px;
        border-radius: 12px;
        border: 0;
        background: transparent;
        color: inherit;
        font: inherit;
        cursor: pointer;
        -webkit-appearance: none;
        appearance: none;
        white-space: nowrap;
      }

      .token-reading {
        min-height: 1.2em;
        margin-bottom: 6px;
        color: var(--muted);
        font-family: var(--reader-body-font);
        font-size: calc(11px * var(--reader-text-scale));
        font-weight: 700;
        line-height: 1;
        text-align: center;
        letter-spacing: 0.02em;
        white-space: nowrap;
      }

      .token-surface {
        white-space: nowrap;
      }

      .token.is-selected,
      .token.highlight {
        background: rgba(109, 199, 163, 0.22);
      }

      .token.is-selected .token-surface,
      .token.highlight .token-surface {
        background: transparent;
        padding-inline: 0;
      }

      .token.punctuation .token-reading {
        visibility: hidden;
      }

      .translation {
        margin: 22px 0 0;
        color: var(--text-soft);
        font-family: var(--reader-body-font);
        font-size: calc(19px * var(--reader-text-scale));
        line-height: 1.55;
        font-weight: 600;
      }

      .translation p {
        margin: 0 0 10px;
      }

      .sheet-handle {
        width: 32px;
        height: 4px;
        margin: 2px auto 10px;
        border-radius: 999px;
        background: var(--line);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.6);
      }

      .vocab-sheet {
        position: relative;
        margin-top: 14px;
        background: var(--surface-strong);
        border: 1px solid var(--line);
        border-radius: 30px;
        box-shadow: var(--shadow);
        padding: 12px 16px 18px;
      }

      .vocab-top {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;
      }

      .vocab-head {
        display: grid;
        gap: 4px;
      }

      .vocab-char {
        margin: 0;
        font-family: var(--reader-display-font);
        font-size: calc(40px * var(--reader-text-scale));
        line-height: 1;
        letter-spacing: -0.05em;
      }

      .vocab-pinyin {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 8px 0 0;
        font-family: var(--reader-body-font);
        font-size: calc(24px * var(--reader-text-scale));
        font-weight: 700;
      }

      .tag {
        display: inline-flex;
        align-items: center;
        padding: 6px 11px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--green);
        font-size: 12px;
        font-weight: 800;
      }

      .vocab-definition {
        margin: 14px 0 0;
        color: var(--text-soft);
        font-family: var(--reader-body-font);
        font-size: calc(16px * var(--reader-text-scale));
        line-height: 1.55;
      }

      .definition-fallback {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px;
        margin-top: 6px;
      }

      .definition-fallback .small-copy {
        flex: 1 1 100%;
        margin: 0;
      }

      .example-box {
        margin-top: 12px;
        padding-top: 12px;
        border-top: 1px solid var(--line);
      }

      .example-cn {
        margin: 0;
        font-family: var(--reader-body-font);
        font-size: calc(17px * var(--reader-text-scale));
        font-weight: 700;
        line-height: 1.45;
      }

      .example-en {
        margin: 4px 0 0;
        color: var(--muted);
        font-family: var(--reader-body-font);
        font-size: calc(14px * var(--reader-text-scale));
        line-height: 1.45;
      }

      .reader-options-panel {
        position: fixed;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        z-index: 30;
        width: min(390px, calc(100vw - 1.5rem));
        max-height: calc(100vh - 2rem);
        overflow: auto;
        padding: 14px 16px 10px;
        border-radius: 26px;
        background: var(--surface-strong);
        border: 1px solid var(--line);
        box-shadow: var(--shadow);
      }

      .reader-scale-row {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
        margin-top: 2px;
      }

      .reader-scale-option {
        display: grid;
        place-items: center;
        min-height: 48px;
        padding: 10px 12px;
        border-radius: 16px;
        border: 1px solid var(--line);
        background: var(--surface);
        color: var(--text);
        text-align: center;
        cursor: pointer;
        box-shadow: var(--shadow-soft);
      }

      .reader-scale-option.is-selected {
        border-color: var(--accent);
        background: var(--surface-strong);
        box-shadow: 0 0 0 2px var(--accent-soft), var(--shadow-soft);
      }

      .reader-scale-option.is-selected strong {
        color: var(--accent);
      }

      .reader-scale-option-body {
        display: grid;
        gap: 0;
        min-width: 0;
      }

      .reader-scale-option-body strong {
        font-size: 13px;
        line-height: 1.15;
        text-align: center;
      }

      .reader-options-backdrop {
        position: fixed;
        inset: 0;
        z-index: 25;
        border: 0;
        padding: 0;
        background: rgba(3, 6, 12, 0.48);
        backdrop-filter: blur(3px);
        cursor: pointer;
      }

      .reader-options-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
      }

      .reader-options-header h2 {
        margin-top: 1px;
        font-size: 20px;
        line-height: 1.1;
      }

      .reader-options-copy {
        margin-top: 8px;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.45;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 8px 12px;
        border-radius: 999px;
        background: var(--pill-bg);
        color: var(--pill-text);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.03em;
      }

      .reader-theme-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 6px;
        margin-top: 0;
      }

      .reader-theme-option {
        display: grid;
        gap: 8px;
        align-content: start;
        width: 100%;
        min-height: 126px;
        padding: 10px;
        border-radius: 20px;
        border: 1px solid var(--line);
        background: var(--surface);
        color: var(--text);
        text-align: left;
        box-shadow: var(--shadow-soft);
      }

      .reader-theme-option:hover {
        transform: translateY(-1px);
        border-color: var(--line-strong);
      }

      .reader-theme-option.is-selected {
        border-color: var(--accent);
        background: var(--surface-strong);
        box-shadow: 0 0 0 2px var(--accent-soft), var(--shadow-soft);
      }

      .reader-theme-option.is-selected strong {
        color: var(--accent);
      }

      .reader-theme-option-swatch {
        width: 100%;
        height: 62px;
        border-radius: 16px;
        border: 1px solid var(--line);
        overflow: hidden;
      }

      .reader-theme-option-swatch[data-theme="neutral"] {
        background:
          linear-gradient(180deg, #fcfaf6 0%, #efeadf 100%);
      }

      .reader-theme-option-swatch[data-theme="sepia"] {
        background:
          linear-gradient(180deg, #fff7ea 0%, #e1c9a8 100%);
      }

      .reader-theme-option-swatch[data-theme="ink"] {
        background:
          linear-gradient(180deg, #1a202b 0%, #080b10 100%);
      }

      .reader-theme-option-swatch[data-theme="black"] {
        background:
          linear-gradient(180deg, #020203 0%, #0d1016 100%);
      }

      .reader-theme-option-body {
        display: grid;
        gap: 0;
        min-width: 0;
      }

      .reader-theme-option-body strong {
        font-size: 13px;
        line-height: 1.15;
        text-align: center;
      }

      #readerThemeStatus {
        background: var(--accent-soft);
        color: var(--accent-strong);
      }

      .bottom-actions {
        gap: 10px;
        margin-top: 16px;
      }

      .button {
        border: 0;
        border-radius: 14px;
        padding: 14px 18px;
        font-weight: 800;
        font-size: 15px;
        cursor: pointer;
      }

      .button-primary {
        flex: 1;
        color: white;
        background: linear-gradient(180deg, var(--accent), var(--accent-strong));
        box-shadow: 0 14px 28px rgba(31, 51, 95, 0.25);
      }

      .button-secondary {
        width: 58px;
        color: var(--text-strong);
        background: var(--surface);
        border: 1px solid var(--line);
      }

      .bottom-spacer {
        height: 8px;
      }

      @media (max-width: 390px) {
        .app { padding-inline: 12px; }
        .sentence-row { font-size: 24px; }
        .vocab-char { font-size: 36px; }
        .vocab-pinyin { font-size: 22px; }
      }
    </style>
  </head>
  <body>
    <main class="app" data-reader-font="mixed" data-reader-theme="neutral" data-reader-text-size="medium">
      <header class="topbar">
        <button class="icon-btn" type="button" aria-label="Back">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 18l-6-6 6-6" />
          </svg>
        </button>
        <div class="header-stack">
        <div class="title-wrap">
          <h1 class="poem-title">春晓</h1>
          <p class="poet">孟浩然</p>
        </div>
        <div class="tool-row">
          <button id="readerTokenModeToggle" class="button button-secondary reader-token-mode-toggle" type="button" aria-pressed="false" aria-label="Switch to character mode">Word</button>
          <button id="readerFontToggle" class="button button-secondary font-toggle" type="button" aria-label="Cycle reader font">Mixed</button>
          <button class="icon-btn" type="button" aria-label="Bookmark">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M6 3h12v18l-6-4-6 4V3z" />
            </svg>
          </button>
          <button class="icon-btn" type="button" aria-label="More options" aria-expanded="false" aria-controls="readerOptionsPanel">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
              <circle cx="5" cy="12" r="1.8" />
              <circle cx="12" cy="12" r="1.8" />
              <circle cx="19" cy="12" r="1.8" />
            </svg>
          </button>
        </div>
        </div>
      </header>

      <div id="readerPager" class="reader-pager" aria-label="Sentence navigation"></div>
      <div id="readerSessionPill" class="session-pill" aria-live="polite" hidden></div>

      <article class="reading-surface">
        <div class="reading-body">
          <div class="annotated-line">
            <div class="pinyin-row">
              <span>chūn</span><span>mián</span><span>bù</span><span>jué</span><span>xiǎo</span><span></span><span>chù</span><span>chù</span><span>wén</span><span>tí</span><span>niǎo</span>
            </div>
            <div class="sentence-row" aria-label="Spring sleep poem line 1">
              <span class="char">春</span>
              <span class="char">眠</span>
              <span class="char">不</span>
              <span class="char highlight">觉</span>
              <span class="char">晓</span>
              <span class="char">，</span>
              <span class="char">处</span>
              <span class="char">处</span>
              <span class="char">闻</span>
              <span class="char">啼</span>
              <span class="char">鸟</span>
              <span class="char">。</span>
            </div>
          </div>
