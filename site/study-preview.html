<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TextPlex Study Preview</title>
    <meta
      name="description"
      content="A standalone study-review mockup for TextPlex, packaged for GitHub Pages."
    />
    <link rel="stylesheet" href="./preview-wide.css" />
    <style>
      :root {
        --bg: #f7f4ee;
        --surface: rgba(255, 255, 255, 0.9);
        --surface-strong: #ffffff;
        --text: #1f2430;
        --muted: #7b8191;
        --line: rgba(31, 36, 48, 0.08);
        --shadow: 0 18px 40px rgba(20, 24, 35, 0.08);
        --shadow-soft: 0 10px 24px rgba(20, 24, 35, 0.06);
        --accent: #1f335f;
        --green: #3f9b68;
        --red: #d36a6a;
        --orange: #d59c4c;
      }

      * { box-sizing: border-box; }
      html, body { min-height: 100%; }
      body {
        margin: 0;
        color: var(--text);
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top, rgba(255,255,255,0.95), transparent 42%),
          linear-gradient(180deg, #fbf9f5 0%, #f3efe7 100%);
      }

      .app {
        max-width: 430px;
        min-height: 100vh;
        margin: 0 auto;
        padding: 18px 16px 24px;
      }

      .status-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        color: #121826;
        font-size: 15px;
        font-weight: 600;
      }

      .status-icons {
        display: flex;
        gap: 8px;
      }

      .topbar {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        margin-bottom: 14px;
      }

      .icon-btn {
        width: 42px;
        height: 42px;
        border: 0;
        border-radius: 50%;
        background: transparent;
        color: #2a3140;
        display: grid;
        place-items: center;
        cursor: pointer;
      }

      .topbar .center {
        justify-self: center;
        font-size: 18px;
        font-weight: 900;
        letter-spacing: -0.03em;
        color: #2a3140;
      }

      .panel {
        background: var(--surface);
        border: 1px solid rgba(31, 36, 48, 0.06);
        border-radius: 24px;
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .progress-wrap {
        padding: 14px 14px 16px;
      }

      .progress-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 10px;
        color: #3a4251;
        font-size: 14px;
        font-weight: 800;
      }

      .progress-bar {
        height: 5px;
        border-radius: 999px;
        overflow: hidden;
        background: rgba(31, 36, 48, 0.09);
      }

      .progress-fill {
        height: 100%;
        width: 38%;
        background: linear-gradient(90deg, #129b68, #27b07c);
        border-radius: inherit;
      }

      .flash-card {
        display: grid;
        place-items: center;
        min-height: 350px;
        padding: 28px 18px 26px;
        margin-top: 14px;
      }

      .char {
        font-family: Georgia, "Times New Roman", serif;
        font-size: 100px;
        line-height: 1;
        margin: 0;
        letter-spacing: -0.08em;
      }

      .pinyin-row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: 14px;
        color: #5d6674;
        font-size: 28px;
        font-weight: 800;
      }

      .tag {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(63, 155, 104, 0.12);
        color: #2f7d53;
        font-size: 13px;
        font-weight: 900;
        margin-top: 18px;
      }

      .reveal-box {
        margin-top: 18px;
        width: 100%;
        min-height: 160px;
        border-radius: 22px;
        border: 1px solid rgba(31, 36, 48, 0.07);
        background: rgba(255, 255, 255, 0.78);
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.7);
        display: grid;
        place-items: center;
        color: #7a8190;
        font-size: 16px;
        font-weight: 800;
        letter-spacing: -0.02em;
      }

      .bottom-actions {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
        margin-top: 14px;
      }

      .action {
        border: 1px solid rgba(31, 36, 48, 0.06);
        border-radius: 18px;
        min-height: 116px;
        background: var(--surface);
        box-shadow: var(--shadow-soft);
        display: grid;
        place-items: center;
        gap: 6px;
        padding: 14px 10px;
        font-weight: 900;
        font-size: 16px;
      }

      .action .icon {
        font-size: 32px;
        line-height: 1;
      }

      .again { color: var(--red); background: rgba(211, 106, 106, 0.07); }
      .hard { color: var(--orange); background: rgba(213, 156, 76, 0.08); }
      .good { color: var(--green); background: rgba(63, 155, 104, 0.08); }

      @media (max-width: 390px) {
        .app { padding-inline: 12px; }
        .flash-card { min-height: 310px; padding-inline: 14px; }
        .char { font-size: 88px; }
        .pinyin-row { font-size: 24px; }
        .bottom-actions { gap: 10px; }
        .action { min-height: 104px; font-size: 14px; }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <button class="icon-btn" type="button" aria-label="Close">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
            <path d="M18 6 6 18M6 6l12 12" />
          </svg>
        </button>
        <div class="center">12 / 32</div>
        <button class="icon-btn" type="button" aria-label="Settings">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3" />
            <path d="M19.4 15a1.7 1.7 0 0 0 .34 1.86l.05.05a2 2 0 1 1-2.83 2.83l-.05-.05a1.7 1.7 0 0 0-1.86-.34 1.7 1.7 0 0 0-1.03 1.56V21a2 2 0 1 1-4 0v-.09a1.7 1.7 0 0 0-1.03-1.56 1.7 1.7 0 0 0-1.86.34l-.05.05A2 2 0 1 1 4.9 17.4l.05-.05A1.7 1.7 0 0 0 5.29 15a1.7 1.7 0 0 0-1.56-1.03H3a2 2 0 1 1 0-4h.73a1.7 1.7 0 0 0 1.56-1.03 1.7 1.7 0 0 0-.34-1.86l-.05-.05A2 2 0 1 1 7.73 4.2l.05.05A1.7 1.7 0 0 0 9.64 4.6 1.7 1.7 0 0 0 10.67 3.04V3a2 2 0 1 1 4 0v.04a1.7 1.7 0 0 0 1.03 1.56 1.7 1.7 0 0 0 1.86-.34l.05-.05A2 2 0 1 1 20.93 7l-.05.05A1.7 1.7 0 0 0 20.54 9a1.7 1.7 0 0 0 1.56 1.03H21a2 2 0 1 1 0 4h-.09a1.7 1.7 0 0 0-1.56 1.03Z" />
          </svg>
        </button>
      </header>

      <div class="progress-wrap panel">
        <div class="progress-top">
          <span></span>
          <span>12 / 32</span>
          <span></span>
        </div>
        <div class="progress-bar"><div class="progress-fill"></div></div>
      </div>

      <section class="panel flash-card">
        <h1 class="char">觉</h1>
        <div class="pinyin-row">
          <span>jué</span>
          <span aria-hidden="true">🔊</span>
        </div>
        <div class="tag">HSK 3</div>
        <div class="reveal-box">Tap to reveal meaning 👁</div>
      </section>

      <section class="bottom-actions">
        <button class="action again" type="button">
          <div class="icon">◌</div>
          <div>Again</div>
        </button>
        <button class="action hard" type="button">
          <div class="icon">☹</div>
          <div>Hard</div>
        </button>
        <button class="action good" type="button">
          <div class="icon">☺</div>
          <div>Good</div>
        </button>
      </section>
    </main>
    <script src="./preview-data.js"></script>
    <script type="module" src="./preview-router.js"></script>
  </body>
</html>
