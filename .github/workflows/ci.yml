name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python API and processor
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            apps/api/pyproject.toml
            packages/processor/pyproject.toml

      - name: Install API and processor dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e "apps/api[dev]" -e packages/processor

      - name: Run Python tests
        run: python -m pytest -q

      - name: Run Ruff
        run: python -m ruff check apps/api packages/processor tests

  web:
    name: Site tests, web build, and lint
    runs-on: ubuntu-latest
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      NODE_PATH: ${{ github.workspace }}/apps/web/node_modules
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Run static site tests
        run: npm run test:site

      - name: Start preview reachability server
        working-directory: site
        run: |
          node server.mjs > /tmp/textplex-site.log 2>&1 &
          echo $! > /tmp/textplex-site.pid

      - name: Check preview routes
        env:
          TEXTPLEX_WEB_BASE_URLS: http://127.0.0.1:8200
          TEXTPLEX_SKIP_API_HEALTH: "1"
        run: npm run test:web

      - name: Stop preview reachability server
        if: always()
        run: kill "$(cat /tmp/textplex-site.pid)" || true

      - name: Build web app
        run: npm run build:web

      - name: Run web lint non-interactively
        env:
          CI: "1"
        run: npm run lint:web
