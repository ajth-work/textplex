services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_TEXTPLEX_API_URL: ${TEXTPLEX_BROWSER_API_URL:-/api}
        NEXT_PUBLIC_TEXTPLEX_DEMO_MODE: ${NEXT_PUBLIC_TEXTPLEX_DEMO_MODE:-false}
        NEXT_PUBLIC_TEXTPLEX_LEGACY_URL: ${TEXTPLEX_LEGACY_URL:-http://127.0.0.1:8200/legacy/index.html}
        NEXT_PUBLIC_SUPABASE_URL: ${SUPABASE_URL:-}
        NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${SUPABASE_PUBLISHABLE_KEY:-}
        TEXTPLEX_API_ORIGIN: ${TEXTPLEX_API_ORIGIN:-http://api:8000}
    environment:
      TEXTPLEX_API_ORIGIN: ${TEXTPLEX_API_ORIGIN:-http://api:8000}
    depends_on:
      - api
    ports:
      - "3000:3000"

  site:
    profiles: ["legacy"]
    build:
      context: ./site
      dockerfile: Dockerfile
    volumes:
      - ./:/workspace
    ports:
      - "8200:8200"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - ./.env
    environment:
      APP_ENV: ${APP_ENV:-development}
      BOOK_DATA_DIR: /workspace/data/books
      USER_DATA_DIR: /workspace/data/user
      DEFAULT_LANGUAGE: zh
      AI_PROVIDER: openai
      TEXTPLEX_CORS_ORIGINS: ${TEXTPLEX_CORS_ORIGINS:-http://127.0.0.1:3000,http://localhost:3000,http://127.0.0.1:8200,https://ajth-work.github.io}
      TEXTPLEX_CORS_ORIGIN_REGEX: ${TEXTPLEX_CORS_ORIGIN_REGEX:-}
    ports:
      - "8201:8000"
    volumes:
      - ./data:/workspace/data
