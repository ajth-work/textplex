services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/workspace/data

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      TEXTPLEX_API_ORIGIN: http://api:8000
    depends_on:
      - api
    ports:
      - "3000:3000"
