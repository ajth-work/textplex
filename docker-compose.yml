services:
  site:
    build:
      context: ./site
      dockerfile: Dockerfile
    ports:
      - "8200:8200"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      APP_ENV: development
      BOOK_DATA_DIR: /workspace/data/books
      USER_DATA_DIR: /workspace/data/user
      DEFAULT_LANGUAGE: zh
      TEXTPLEX_CORS_ORIGINS: http://127.0.0.1:8200,http://192.168.192.231:8200,https://ajth-work.github.io
    ports:
      - "8201:8000"
    volumes:
      - ./data:/workspace/data
