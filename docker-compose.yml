services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/workspace/data

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_TEXTPLEX_API_URL: http://127.0.0.1:8000
    depends_on:
      - api
    ports:
      - "3000:3000"
